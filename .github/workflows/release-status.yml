name: Release Status

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release files
        shell: bash
        run: |
          set -euo pipefail

          test "$(cat shortcuts/weather-for-city/VERSION)" = "1.2"
          test -f "shortcuts/weather-for-city/Weather for City.shortcut"
          test -f "shortcuts/weather-for-city/Weather_for_City.xml"
          test -f "shortcuts/weather-for-city/README.de.md"
          test -f "shortcuts/weather-for-city/PRIVACY_REPORT.md"
          test -f "shortcuts/weather-for-city/PRIVACY_REPORT.de.md"
          test -f "shortcuts/weather-for-city/CHECKSUMS.txt"
          test -f "shortcuts/weather-for-city/dist/weather-for-city-1.2.zip"
          test -f "shortcuts/weather-for-city/dist/weather-for-city-1.2.zip.sha256"
          test -f "shortcuts/weather-for-city/RELEASE_NOTES.md"
          test -f "shortcuts/weather-for-city/PORTFOLIO_UPDATE.md"
          test -f "shortcuts/weather-for-city/assets/html-preview.svg"
          test -f "PROJECT_CONTEXT.md"
          test -f "PROJECT_CONTEXT.de.md"
          test -f "NEXT_STEPS.md"
          test -f "NEXT_STEPS.de.md"
          test -f "README.de.md"

          grep -q "Version: \`1.2\`" shortcuts/weather-for-city/README.md
          grep -q "Fahrenheit" shortcuts/weather-for-city/README.md
          grep -q "update check" shortcuts/weather-for-city/README.md
          grep -q "Deutsch: \\[README.de.md\\]" shortcuts/weather-for-city/README.md
          grep -q "English: \\[README.md\\]" shortcuts/weather-for-city/README.de.md
          grep -q "assets/html-preview.svg" README.md
          grep -q "assets/html-preview.svg" README.de.md
          grep -q "no private credentials" shortcuts/weather-for-city/PRIVACY_REPORT.md

          shasum -a 256 -c shortcuts/weather-for-city/CHECKSUMS.txt
          shasum -a 256 -c shortcuts/weather-for-city/dist/weather-for-city-1.2.zip.sha256

          if grep -R \
            --exclude-dir=.git \
            --exclude="release-status.yml" \
            -e "/Users/martin\\|gho_\\|API_KEY\\|TOKEN\\|PASSWORD" \
            .; then
            echo "Potential private data found."
            exit 1
          fi

      - name: Show release summary
        run: |
          echo "Release 1.2 files are present and privacy checks passed."
