name: Update Weather release notes
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  update:
    if: github.event.head_commit.message == 'Publish updated Weather v1.2.2 link'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit v1.2.2 --notes-file shortcuts/weather-for-city/RELEASE_NOTES.md
