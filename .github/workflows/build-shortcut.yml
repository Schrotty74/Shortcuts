name: Build Shortcut

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sign-shortcut:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build and sign importable shortcut
        run: |
          plutil -convert binary1 \
            -o unsigned-weather-for-city.shortcut \
            "shortcuts/weather-for-city/Weather_for_City.xml"
          shortcuts sign --mode anyone \
            --input unsigned-weather-for-city.shortcut \
            --output "Weather for City.shortcut"

      - name: Verify shortcut archive
        run: |
          test -s "Weather for City.shortcut"
          file "Weather for City.shortcut"

      - name: Upload signed shortcut
        uses: actions/upload-artifact@v4
        with:
          name: weather-for-city-shortcut
          path: Weather for City.shortcut
          if-no-files-found: error
