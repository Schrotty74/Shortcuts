name: Remove invalid Weather v1.2.2 assets
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  remove:
    if: github.event.head_commit.message == 'Run Weather asset cleanup'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove unsigned downloads
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete-asset v1.2.2 Weather.for.City.shortcut --yes
          gh release delete-asset v1.2.2 weather-for-city-1.2.2.zip --yes
          gh release delete-asset v1.2.2 weather-for-city-1.2.2.zip.sha256 --yes
